    <!-- Google Analytics 4 con Consent Mode -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }

      const hmConsent = localStorage.getItem('hmConsent');

      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: hmConsent === 'granted' ? 'granted' : 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted'
      });

      (function loadGA() {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-VC77BXKJVM';
        document.head.appendChild(s);
      })();

  <body class="antialiased">

    <!-- Cookie Banner Hypemove -->
    <style>
      .hm-cookie {
        position: fixed;
        inset: auto 16px 16px 16px;
        z-index: 9999;
        margin: 0 auto;
        max-width: 960px;
        background: #0f172a;
        color: #fff;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        display: none;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: space-between;
      }

      .hm-cookie.show {
        display: flex;
      }

      .hm-cookie p {
        margin: 0;
        line-height: 1.5;
        font-size: 14px;
        max-width: 70%;
      }

      .hm-cookie a {
        color: #ffff33;
        text-decoration: underline;
      }

      .hm-actions {
        display: flex;
        gap: 8px;
      }

      .hm-btn {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
      }

      .hm-btn-accept {
        background: #335dff;
        color: #fff;
      }

      .hm-btn-decline {
        background: #e5e7eb;
        color: #111827;
      }

      @media (max-width: 768px) {
        .hm-cookie {
          inset: auto 12px 12px 12px;
        }

        .hm-cookie p {
          max-width: 100%;
        }

        .hm-actions {
          width: 100%;
        }

        .hm-btn {
          flex: 1;
        }
      }
    </style>

    <div
      id="hm-cookie"
      class="hm-cookie"
      role="dialog"
      aria-live="polite"
      aria-label="Consenso cookie"
    >
      <p>
        Usiamo cookie per migliorare l’esperienza sul sito e misurare l’utilizzo della
        pagina. Puoi accettare o rifiutare i cookie analytics. Leggi la
        <a href="/legal/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.
      </p>
      <div class="hm-actions">
        <button id="hm-decline" class="hm-btn hm-btn-decline">Rifiuta</button>
        <button id="hm-accept" class="hm-btn hm-btn-accept">Accetta</button>
      </div>
    </div>

    <script>
      (function () {
        const banner = document.getElementById('hm-cookie');
        const stored = localStorage.getItem('hmConsent');

        if (!stored) banner.classList.add('show');

        function hide() {
          banner.classList.remove('show');
        }

        function enableGA() {
          gtag('consent', 'update', { analytics_storage: 'granted' });
          gtag('js', new Date());
          gtag('config', 'G-VC77BXKJVM');
        }

        document.getElementById('hm-accept').addEventListener('click', function () {
          localStorage.setItem('hmConsent', 'granted');
          enableGA();
          hide();
        });

        document.getElementById('hm-decline').addEventListener('click', function () {
          localStorage.setItem('hmConsent', 'denied');
          gtag('consent', 'update', { analytics_storage: 'denied' });
          hide();
        });

        if (stored === 'granted') {
          enableGA();
        }
      })();
    </script>
