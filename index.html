<!doctype html>
<html lang="it">
  <head>
    <!-- Meta base -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FDFDFD" />
    <link rel="canonical" href="https://www.hypemove.app/" />

    <!-- SEO -->
    <title>Hypemove – L’app fitness che ti aiuta a iniziare e continuare davvero</title>
    <meta
      name="description"
      content="Hypemove ti aiuta a trovare un piano più adatto al tuo obiettivo e a rendere il movimento più semplice da iniziare, più facile da seguire e più realistico da mantenere nel tempo. Provala gratis."
    />
    <meta name="author" content="Hypemove Team" />
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon & App icons -->
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hypemove" />
    <meta property="og:locale" content="it_IT" />
    <meta
      property="og:title"
      content="Hypemove – L’app fitness che ti aiuta a iniziare e continuare davvero"
    />
    <meta
      property="og:description"
      content="Più semplice da iniziare. Più facile da continuare. Trova un piano più adatto a te e inizia gratis."
    />
    <meta property="og:url" content="https://www.hypemove.app/" />
    <meta property="og:image" content="https://www.hypemove.app/images/logo1.png" />
    <meta property="og:image:secure_url" content="https://www.hypemove.app/images/logo1.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Hypemove" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Hypemove – L’app fitness che ti aiuta a iniziare e continuare davvero"
    />
    <meta
      name="twitter:description"
      content="Trova un piano più adatto a te e rendi il movimento più facile da iniziare e mantenere."
    />
    <meta name="twitter:image" content="https://www.hypemove.app/images/logo1.png" />
    <meta name="twitter:site" content="@hypemoveapp" />

    <!-- JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Hypemove",
        "url": "https://www.hypemove.app/",
        "logo": "https://www.hypemove.app/images/logo1.png",
        "sameAs": [
          "https://www.instagram.com/hypemoveapp",
          "https://www.linkedin.com/company/hypemove"
        ]
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Hypemove",
        "url": "https://www.hypemove.app/"
      }
    </script>

    <!-- Google Analytics 4 con Consent Mode -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }

      const hmConsent = localStorage.getItem('hmConsent');

      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: hmConsent === 'granted' ? 'granted' : 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted'
      });

      (function loadGA(){
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-VC77BXKJVM';
        document.head.appendChild(s);
      })();
    </script>
  </head>

  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Cookie Banner Hypemove -->
    <style>
      .hm-cookie {
        position: fixed;
        inset: auto 16px 16px 16px;
        z-index: 9999;
        margin: 0 auto;
        max-width: 960px;
        background: #0f172a;
        color: #fff;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        display: none;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: space-between;
      }

      .hm-cookie.show {
        display: flex;
      }

      .hm-cookie p {
        margin: 0;
        line-height: 1.5;
        font-size: 14px;
        max-width: 70%;
      }

      .hm-cookie a {
        color: #ffff33;
        text-decoration: underline;
      }

      .hm-actions {
        display: flex;
        gap: 8px;
      }

      .hm-btn {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
      }

      .hm-btn-accept {
        background: #335dff;
        color: #fff;
      }

      .hm-btn-decline {
        background: #e5e7eb;
        color: #111827;
      }

      @media (max-width: 768px) {
        .hm-cookie {
          inset: auto 12px 12px 12px;
        }

        .hm-cookie p {
          max-width: 100%;
        }

        .hm-actions {
          width: 100%;
        }

        .hm-btn {
          flex: 1;
        }
      }
    </style>

    <div id="hm-cookie" class="hm-cookie" role="dialog" aria-live="polite" aria-label="Consenso cookie">
      <p>
        Usiamo cookie per migliorare l’esperienza sul sito e misurare l’utilizzo della pagina.
        Puoi accettare o rifiutare i cookie analytics.
        Leggi la
        <a href="/legal/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.
      </p>
      <div class="hm-actions">
        <button id="hm-decline" class="hm-btn hm-btn-decline">Rifiuta</button>
        <button id="hm-accept" class="hm-btn hm-btn-accept">Accetta</button>
      </div>
    </div>

    <script>
      (function () {
        const banner = document.getElementById('hm-cookie');
        const stored = localStorage.getItem('hmConsent');

        if (!stored) banner.classList.add('show');

        function hide() {
          banner.classList.remove('show');
        }

        function enableGA() {
          gtag('consent', 'update', { analytics_storage: 'granted' });
          gtag('js', new Date());
          gtag('config', 'G-VC77BXKJVM');
        }

        document.getElementById('hm-accept').addEventListener('click', function () {
          localStorage.setItem('hmConsent', 'granted');
          enableGA();
          hide();
        });

        document.getElementById('hm-decline').addEventListener('click', function () {
          localStorage.setItem('hmConsent', 'denied');
          gtag('consent', 'update', { analytics_storage: 'denied' });
          hide();
        });

        if (stored === 'granted') {
          enableGA();
        }
      })();
    </script>
  </body>
</html>
